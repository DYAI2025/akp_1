name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Verify frontend and deployment build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build production assets
        run: npm run build

      - name: Smoke-test Railway server
        run: npm run smoke:server
