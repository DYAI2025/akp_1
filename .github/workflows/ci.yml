name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test-deploy-readiness:
    name: Build, test, and Railway readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Run unit and deployment tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Smoke-test production server
        run: npm run smoke:server
